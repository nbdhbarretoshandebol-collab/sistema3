<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBDH2 Barretos — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --azul: #1a237e; --azul-esc: #0d1757; --azul-cl: #e8eaf6;
  --amarelo: #f9c900; --verde: #1e8449; --vermelho: #c0392b;
  --borda: #dde0f0; --texto: #1a1a2e; --leve: #6b6b8a;
  --fundo: #f0f2fa; --branco: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--fundo); color: var(--texto); min-height: 100vh; display: flex; flex-direction: column; }

/* ── LOGIN ── */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, var(--azul-esc) 0%, var(--azul) 100%); }
.login-card { background: white; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.login-logos { display: flex; gap: 14px; justify-content: center; margin-bottom: 20px; }
.login-logos img { height: 60px; width: 60px; object-fit: contain; border-radius: 12px; background: #f8f9fa; padding: 4px; }
.login-title { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; text-align: center; color: var(--azul-esc); margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--leve); text-align: center; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--leve); margin-bottom: 6px; }
.form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--borda); border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--texto); transition: border-color .2s; }
.form-group input:focus { outline: none; border-color: var(--azul); }
.btn-login { width: 100%; padding: 13px; background: var(--azul); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; margin-top: 4px; transition: background .2s; }
.btn-login:hover { background: var(--azul-esc); }
.login-erro { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--vermelho); margin-top: 12px; display: none; text-align: center; }

/* ── LAYOUT PRINCIPAL ── */
.app { display: none; flex-direction: column; min-height: 100vh; }
.topbar { background: var(--azul-esc); padding: 0; position: sticky; top: 0; z-index: 100; }
.topbar-inner { max-width: 1300px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; gap: 12px; }
.topbar-logos { display: flex; gap: 8px; }
.topbar-logos img { height: 36px; width: 36px; object-fit: contain; border-radius: 6px; background: white; padding: 2px; }
.topbar-title { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600; color: white; flex: 1; }
.topbar-user { font-size: 13px; color: rgba(255,255,255,0.7); margin-right: 10px; }
.btn-sair { padding: 6px 14px; background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-sair:hover { background: rgba(255,255,255,0.22); }

/* ── NAV ── */
.nav { background: var(--azul); border-bottom: 2px solid var(--azul-esc); }
.nav-inner { max-width: 1300px; margin: 0 auto; padding: 0 24px; display: flex; gap: 4px; overflow-x: auto; }
.nav-btn { padding: 13px 20px; color: rgba(255,255,255,0.7); border: none; background: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; border-bottom: 3px solid transparent; transition: all .2s; }
.nav-btn:hover { color: white; }
.nav-btn.ativo { color: var(--amarelo); border-bottom-color: var(--amarelo); font-weight: 600; }

/* ── CONTEÚDO ── */
.content { max-width: 1300px; margin: 0 auto; padding: 28px 24px; flex: 1; width: 100%; }
.pagina { display: none; }
.pagina.ativa { display: block; }

/* ── CARDS STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
.stat-card { background: white; border-radius: 14px; padding: 18px; border: 1px solid var(--borda); }
.stat-num { font-family: 'Sora', sans-serif; font-size: 30px; font-weight: 700; color: var(--azul); }
.stat-lbl { font-size: 13px; color: var(--leve); margin-top: 3px; }

/* ── CARD GENÉRICO ── */
.card { background: white; border-radius: 14px; border: 1px solid var(--borda); overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 18px 22px; border-bottom: 1px solid var(--borda); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.card-titulo { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; }
.card-body { padding: 22px; }

/* ── BOTÕES ── */
.btn { padding: 9px 18px; border: none; border-radius: 9px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .18s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--azul); color: white; }
.btn-primary:hover { background: var(--azul-esc); }
.btn-success { background: var(--verde); color: white; }
.btn-success:hover { background: #165c33; }
.btn-danger { background: var(--vermelho); color: white; }
.btn-danger:hover { background: #962d22; }
.btn-ghost { background: var(--azul-cl); color: var(--azul); border: 1px solid #c5cae9; }
.btn-ghost:hover { background: #c5cae9; }
.btn-sm { padding: 5px 12px; font-size: 13px; }
.btn-amarelo { background: var(--amarelo); color: var(--azul-esc); font-weight: 600; }
.btn-amarelo:hover { background: #e6b800; }

/* ── BUSCA ROW ── */
.busca-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.busca-input { flex: 1; min-width: 180px; padding: 10px 14px; border: 1.5px solid var(--borda); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--texto); }
.busca-input:focus { outline: none; border-color: var(--azul); }
.busca-select { padding: 10px 14px; border: 1.5px solid var(--borda); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--texto); background: white; cursor: pointer; }
.aba-sexo { padding: 8px 20px; border: none; background: none; font-size: 14px; font-weight: 500; color: var(--leve); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: 'DM Sans', sans-serif; transition: all .2s; }
.aba-sexo:hover { color: var(--azul); }
.aba-sexo.ativa { color: var(--azul); border-bottom-color: var(--azul); font-weight: 600; }

/* ── TABELA ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { background: #f4f5fb; padding: 11px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--leve); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--borda); white-space: nowrap; }
td { padding: 12px 16px; border-bottom: 1px solid #f0f1f8; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8f9fe; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-azul { background: #dbeafe; color: #1e40af; }
.badge-verde { background: #d1fae5; color: #065f46; }
.badge-vermelho { background: #fee2e2; color: #991b1b; }
.badge-amarelo { background: #fef3c7; color: #92400e; }
.badge-cinza { background: #f1f5f9; color: #475569; }
.td-nome { display: flex; align-items: center; gap: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }

/* ── TOGGLE ── */
.toggle-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.toggle-label { font-size: 11px; font-weight: 500; }
.toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #e2e8f0; border-radius: 24px; transition: background .25s; }
.toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .25s; }
.toggle input:checked + .toggle-slider { background: var(--verde); }
.toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
.toggle input:disabled + .toggle-slider { opacity: .5; cursor: not-allowed; }

/* ── MODAL ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; overflow-y: auto; padding: 20px; }
.overlay.aberto { display: flex; align-items: flex-start; justify-content: center; }
.modal { background: white; border-radius: 18px; width: 100%; max-width: 720px; overflow: hidden; margin: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal-header { background: var(--azul-esc); padding: 22px 26px; display: flex; align-items: center; gap: 14px; }
.modal-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--amarelo); display: flex; align-items: center; justify-content: center; font-family: 'Sora',sans-serif; font-size: 18px; font-weight: 700; color: var(--azul-esc); flex-shrink: 0; }
.modal-nome { font-family: 'Sora',sans-serif; font-size: 17px; font-weight: 600; color: white; }
.modal-sub { font-size: 13px; color: rgba(255,255,255,.65); margin-top: 2px; }
.modal-close { margin-left: auto; background: rgba(255,255,255,.15); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-body { padding: 24px 26px; max-height: 70vh; overflow-y: auto; }
.modal-footer { padding: 16px 26px; border-top: 1px solid var(--borda); display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
.modal-sec { font-size: 11px; font-weight: 600; color: var(--leve); text-transform: uppercase; letter-spacing: .07em; margin: 18px 0 10px; }
.modal-sec:first-child { margin-top: 0; }
.dados-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.dado { background: #f6f7fb; border-radius: 9px; padding: 10px 13px; }
.dado-lbl { font-size: 11px; color: var(--leve); margin-bottom: 3px; }
.dado-val { font-size: 14px; font-weight: 500; }
.dado input, .dado select, .dado textarea { width: 100%; padding: 7px 10px; border: 1.5px solid var(--borda); border-radius: 7px; font-size: 14px; font-family: 'DM Sans',sans-serif; color: var(--texto); background: white; }
.dado input:focus, .dado select:focus, .dado textarea:focus { outline: none; border-color: var(--azul); }
.fotos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
.foto-card { background: #f6f7fb; border-radius: 10px; padding: 14px; text-align: center; }
.foto-label { font-size: 12px; color: var(--leve); margin-bottom: 8px; }
.btn-foto { display: block; padding: 7px 12px; background: var(--azul); color: white; border-radius: 8px; font-size: 13px; text-decoration: none; font-weight: 500; }
.btn-foto-vazio { display: block; padding: 7px 12px; background: #f1f5f9; color: var(--leve); border-radius: 8px; font-size: 13px; }

/* ── FOTO UPLOAD WIDGET ── */
.foto-upload-box { border: 2px dashed #c5cae9; border-radius: 10px; overflow: hidden; transition: border-color .2s, background .2s; }
.foto-upload-box:hover { border-color: var(--azul); }
.foto-upload-box.tem-foto { border-style: solid; border-color: var(--verde); }
.foto-upload-vazio { padding: 18px 12px; text-align: center; cursor: pointer; }
.foto-upload-vazio-icon { font-size: 28px; margin-bottom: 6px; }
.foto-upload-vazio-txt { font-size: 12px; color: var(--leve); line-height: 1.4; }
.foto-preview-img { width: 100%; aspect-ratio: 3/2; object-fit: cover; display: block; }
.foto-upload-acoes { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0; border-top: 1px solid var(--borda); }
.foto-upload-acoes button { padding: 8px 6px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background .15s; }
.foto-btn-galeria { background: #e8eaf6; color: var(--azul); border-right: 1px solid var(--borda) !important; }
.foto-btn-galeria:hover { background: #c5cae9; }
.foto-btn-camera  { background: #e8f5e9; color: var(--verde); border-right: 1px solid var(--borda) !important; }
.foto-btn-camera:hover  { background: #c8e6c9; }
.foto-btn-remover { background: #fef2f2; color: var(--vermelho); }
.foto-btn-remover:hover { background: #fee2e2; }
.foto-compress-badge { display: inline-block; background: #d1fae5; color: #065f46; border-radius: 20px; font-size: 10px; font-weight: 600; padding: 2px 7px; margin-top: 4px; }

/* ── CONFIRMAÇÃO ── */
.confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 400; align-items: center; justify-content: center; }
.confirm-overlay.aberto { display: flex; }
.confirm-box { background: white; border-radius: 16px; padding: 32px 28px; max-width: 360px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.confirm-icon { font-size: 40px; margin-bottom: 14px; }
.confirm-titulo { font-family: 'Sora',sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--texto); }
.confirm-msg { font-size: 14px; color: var(--leve); margin-bottom: 24px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }

/* ── AGENDA ── */
.agenda-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.evento-card { background: white; border-radius: 13px; border: 1px solid var(--borda); padding: 16px; display: flex; flex-direction: column; gap: 8px; transition: box-shadow .2s; }
.evento-card:hover { box-shadow: 0 4px 16px rgba(26,35,126,.1); }
.evento-tipo { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.evento-titulo { font-family: 'Sora',sans-serif; font-size: 15px; font-weight: 600; }
.evento-data { font-size: 13px; color: var(--leve); display: flex; align-items: center; gap: 5px; }
.evento-desc { font-size: 13px; color: var(--leve); line-height: 1.4; }
.evento-footer { display: flex; justify-content: flex-end; margin-top: 4px; }

/* ── ANOTAÇÕES ── */
.anot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.anot-card { background: white; border-radius: 13px; border: 1px solid var(--borda); padding: 18px; display: flex; flex-direction: column; gap: 8px; transition: box-shadow .2s; }
.anot-card.alta { border-left: 4px solid var(--vermelho); }
.anot-card.media { border-left: 4px solid var(--amarelo); }
.anot-card.baixa { border-left: 4px solid var(--verde); }
.anot-card:hover { box-shadow: 0 4px 16px rgba(26,35,126,.1); }
.anot-header { display: flex; align-items: center; justify-content: space-between; }
.anot-autor { font-size: 12px; color: var(--leve); }
.anot-texto { font-size: 14px; line-height: 1.5; }
.anot-data { font-size: 12px; color: var(--leve); }

/* ── FORMULÁRIO INLINE ── */
.form-inline { background: #f6f7fb; border-radius: 13px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--borda); }
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 14px; }
.form-group-i { display: flex; flex-direction: column; gap: 5px; }
.form-group-i label { font-size: 12px; font-weight: 600; color: var(--leve); text-transform: uppercase; letter-spacing: .05em; }
.form-group-i input, .form-group-i select, .form-group-i textarea { padding: 9px 12px; border: 1.5px solid var(--borda); border-radius: 9px; font-size: 14px; font-family: 'DM Sans',sans-serif; color: var(--texto); background: white; }
.form-group-i input:focus, .form-group-i select:focus, .form-group-i textarea:focus { outline: none; border-color: var(--azul); }

/* ── HOME ── */
.home-wrap { padding: 10px 0 30px; }
.home-header { text-align: center; padding: 40px 20px 36px; }
.home-logos { display: flex; gap: 18px; justify-content: center; align-items: center; margin-bottom: 24px; }
.home-logos img { height: 90px; width: 90px; object-fit: contain; border-radius: 16px; background: white; padding: 6px; box-shadow: 0 4px 20px rgba(26,35,126,.15); }
.home-titulo { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; color: var(--azul-esc); margin-bottom: 8px; }
.home-sub { font-size: 15px; color: var(--leve); margin-bottom: 6px; }
.home-usuario { display: inline-block; background: var(--azul-cl); color: var(--azul); padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; margin-top: 10px; }
.home-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; padding: 0 4px; }
.home-card { background: white; border-radius: 16px; border: 1px solid var(--borda); padding: 28px 24px; cursor: pointer; transition: all .2s; display: flex; flex-direction: column; gap: 12px; }
.home-card:hover { box-shadow: 0 8px 28px rgba(26,35,126,.15); transform: translateY(-3px); border-color: var(--azul); }
.home-card-icon { font-size: 36px; }
.home-card-titulo { font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 700; color: var(--azul-esc); }
.home-card-desc { font-size: 13px; color: var(--leve); line-height: 1.5; }
.home-card-btn { margin-top: 6px; align-self: flex-start; padding: 7px 16px; background: var(--azul-cl); color: var(--azul); border: 1px solid #c5cae9; border-radius: 9px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background .18s; }
.home-card:hover .home-card-btn { background: var(--azul); color: white; }
.btn-home { padding: 6px 14px; background: rgba(255,255,255,.12); color: white; border: 1px solid rgba(255,255,255,.2); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-home:hover { background: rgba(255,255,255,.22); }

/* ── RELAÇÕES ── */
.rel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; margin-top: 4px; }
.rel-card { background: white; border-radius: 14px; border: 1px solid var(--borda); overflow: hidden; }
.rel-card-header { background: var(--azul-esc); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.rel-card-titulo { font-family: 'Sora',sans-serif; font-size: 15px; font-weight: 600; color: white; flex: 1; }
.rel-card-meta { font-size: 12px; color: rgba(255,255,255,.65); }
.rel-card-body { padding: 14px 18px; }
.rel-secao { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--leve); margin: 12px 0 6px; }
.rel-secao:first-child { margin-top: 0; }
.rel-membro { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f0f1f8; }
.rel-membro:last-child { border-bottom: none; }
.rel-membro-info { flex: 1; }
.rel-membro-nome { font-size: 14px; font-weight: 500; }
.rel-membro-sub { font-size: 12px; color: var(--leve); }
.rel-membro-rm { background: none; border: none; color: var(--vermelho); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 6px; }
.rel-membro-rm:hover { background: #fee2e2; }
.rel-empty { font-size: 13px; color: var(--leve); text-align: center; padding: 12px 0; }
.rel-add-row { display: flex; gap: 8px; margin-top: 10px; }
.rel-add-row select { flex: 1; padding: 8px 10px; border: 1.5px solid var(--borda); border-radius: 9px; font-size: 13px; font-family: 'DM Sans',sans-serif; color: var(--texto); background: white; }
.rel-add-row select:focus { outline: none; border-color: var(--azul); }
.rel-card-footer { padding: 12px 18px; border-top: 1px solid var(--borda); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

/* ── LOCAIS DE TREINO (ESCOLINHAS) ── */
.locais-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-top: 10px; }
.local-card { background: white; border-radius: 14px; border: 1px solid var(--borda); overflow: hidden; transition: box-shadow .2s; }
.local-card:hover { box-shadow: 0 4px 16px rgba(26,35,126,.1); }
.local-card-header { background: var(--azul); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.local-card-header h3 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 600; color: white; margin: 0; flex: 1; }
.local-card-badge { background: var(--amarelo); color: var(--azul-esc); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.local-card-body { padding: 16px; }
.local-info { background: #f8f9fe; border-radius: 10px; padding: 12px; margin-bottom: 16px; }
.local-info p { margin: 5px 0; font-size: 13px; color: var(--leve); display: flex; align-items: center; gap: 8px; }
.local-info strong { color: var(--texto); font-weight: 600; width: 70px; display: inline-block; }
.local-secao { font-size: 12px; font-weight: 700; color: var(--azul); margin: 12px 0 8px; text-transform: uppercase; letter-spacing: .05em; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--borda); padding-bottom: 4px; }
.local-membro { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f1f8; }
.local-membro:last-child { border-bottom: none; }
.local-membro-info { flex: 1; }
.local-membro-nome { font-size: 14px; font-weight: 500; }
.local-membro-sub { font-size: 12px; color: var(--leve); }
.local-membro-rm { background: none; border: none; color: var(--vermelho); cursor: pointer; font-size: 16px; padding: 2px 8px; border-radius: 6px; }
.local-membro-rm:hover { background: #fee2e2; }
.local-empty { font-size: 13px; color: var(--leve); text-align: center; padding: 12px 0; font-style: italic; }
.local-add-row { display: flex; gap: 8px; margin-top: 12px; }
.local-add-row select { flex: 1; padding: 8px 10px; border: 1.5px solid var(--borda); border-radius: 9px; font-size: 13px; font-family: 'DM Sans', sans-serif; }
.local-add-row button { padding: 8px 14px; }
.local-card-footer { padding: 12px 16px; border-top: 1px solid var(--borda); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; background: #fafbff; }

/* ── MODAL LOCAL ── */
.modal-local .modal { max-width: 550px; }
.modal-local .modal-body { padding: 20px 24px; }
.modal-local .dado { margin-bottom: 12px; }

/* ── LOADING / VAZIO ── */
.loading { text-align: center; padding: 40px; color: var(--leve); font-size: 14px; }
.spinner { width: 24px; height: 24px; border: 3px solid var(--borda); border-top-color: var(--azul); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.vazio { text-align: center; padding: 48px; color: var(--leve); }
.vazio-icon { font-size: 36px; margin-bottom: 12px; }
.page-title { font-family: 'Sora',sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 22px; color: var(--azul-esc); }

@media (max-width: 600px) {
  .dados-grid, .fotos-grid, .form-grid { grid-template-columns: 1fr; }
