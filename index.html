<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Gestão Esportiva</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f1f5f9;
}

/* HEADER */
header {
  background: #0f172a;
  color: #fff;
  padding: 15px;
  display: flex;
  gap: 10px;
}

header button {
  background: #1e293b;
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

/* ABAS */
.aba {
  display: none;
  padding: 20px;
}

.ativa {
  display: block;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card h3 {
  margin-top: 0;
}

/* BOTÕES */
.btn {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.btn-sec {
  background: #e2e8f0;
  color: #111;
}

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}

.modal input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <button onclick="trocarAba('atletas')">Atletas</button>
  <button onclick="trocarAba('prof')">Professores</button>
  <button onclick="trocarAba('esc')">Escolinhas</button>
</header>

<!-- ATLETAS -->
<div id="atletas" class="aba ativa">
  <h2>Atletas</h2>
  <button class="btn" onclick="abrirModal('atleta')">+ Novo</button>
  <div id="lista-atletas" class="grid"></div>
</div>

<!-- PROFESSORES -->
<div id="prof" class="aba">
  <h2>Professores</h2>
  <button class="btn" onclick="abrirModal('prof')">+ Novo</button>
  <div id="lista-prof" class="grid"></div>
</div>

<!-- ESCOLINHAS -->
<div id="esc" class="aba">
  <h2>Escolinhas</h2>
  <button class="btn" onclick="abrirModal('esc')">+ Nova</button>
  <div id="lista-esc" class="grid"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-titulo"></h3>
    <input id="input-nome" placeholder="Nome">
    <button class="btn" onclick="salvarModal()">Salvar</button>
    <button class="btn-sec" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
let atletas = [];
let professores = [];
let escolinhas = [];

let tipoAtual = null;

/* TROCA ABA */
function trocarAba(id){
  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');

  renderTudo();
}

/* MODAL */
function abrirModal(tipo){
  tipoAtual = tipo;
  document.getElementById('modal').style.display = 'flex';

  const titulo = {
    atleta: "Novo Atleta",
    prof: "Novo Professor",
    esc: "Nova Escolinha"
  };

  document.getElementById('modal-titulo').innerText = titulo[tipo];
}

function fecharModal(){
  document.getElementById('modal').style.display = 'none';
  document.getElementById('input-nome').value = '';
}

/* SALVAR */
function salvarModal(){
  let nome = document.getElementById('input-nome').value;
  if(!nome) return;

  if(tipoAtual === 'atleta'){
    atletas.push({ id: Date.now(), nome });
  }

  if(tipoAtual === 'prof'){
    professores.push({ id: Date.now(), nome });
  }

  if(tipoAtual === 'esc'){
    escolinhas.push({
      id: Date.now(),
      nome,
      atletas: [],
      professores: []
    });
  }

  fecharModal();
  renderTudo();
}

/* RENDER GERAL */
function renderTudo(){
  renderAtletas();
  renderProf();
  renderEscolinhas();
}

/* ATLETAS */
function renderAtletas(){
  let el = document.getElementById('lista-atletas');
  el.innerHTML = atletas.map(a => `
    <div class="card">
      <h3>${a.nome}</h3>
    </div>
  `).join('');
}

/* PROFESSORES */
function renderProf(){
  let el = document.getElementById('lista-prof');
  el.innerHTML = professores.map(p => `
    <div class="card">
      <h3>${p.nome}</h3>
    </div>
  `).join('');
}

/* ESCOLINHAS */
function renderEscolinhas(){
  let el = document.getElementById('lista-esc');

  el.innerHTML = escolinhas.map((e, i) => {

    let optsAtletas = atletas.map(a =>
      `<option value="${a.id}">${a.nome}</option>`
    ).join('');

    let optsProf = professores.map(p =>
      `<option value="${p.id}">${p.nome}</option>`
    ).join('');

    return `
      <div class="card">
        <h3>${e.nome}</h3>

        <b>Atletas:</b>
        ${e.atletas.map(a => `<div>${a.nome}</div>`).join('')}

        <select onchange="addAtleta(${i}, this.value)">
          <option>Adicionar atleta</option>
          ${optsAtletas}
        </select>

        <hr>

        <b>Professores:</b>
        ${e.professores.map(p => `<div>${p.nome}</div>`).join('')}

        <select onchange="addProf(${i}, this.value)">
          <option>Adicionar professor</option>
          ${optsProf}
        </select>

      </div>
    `;
  }).join('');
}

/* VINCULOS */
function addAtleta(i, id){
  let a = atletas.find(x => x.id == id);
  if(a) escolinhas[i].atletas.push(a);
  renderEscolinhas();
}

function addProf(i, id){
  let p = professores.find(x => x.id == id);
  if(p) escolinhas[i].professores.push(p);
  renderEscolinhas();
}

</script>

</body>
</html>
